version: '3.8'

services:
  # ── PostgreSQL Database ──────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: erp-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: erp_universal
      POSTGRES_USER: erp
      POSTGRES_PASSWORD: ${DB_PASSWORD:-erp_secret_2026}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - '5432:5432'
    healthcheck:
      test: ['CMD', 'pg_isready', '-U', 'erp', '-d', 'erp_universal']
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Redis Cache & Queue ─────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: erp-redis
    restart: unless-stopped
    command: redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru
    volumes:
      - redis_data:/data
    ports:
      - '6379:6379'
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 10s
      timeout: 3s
      retries: 5

  # ── Laravel App (Nginx + PHP-FPM) ───────────────────────────────
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: erp-app
    restart: unless-stopped
    environment:
      APP_NAME: "ERP Universal"
      APP_ENV: production
      APP_DEBUG: "false"
      APP_URL: ${APP_URL:-http://localhost}
      APP_LOCALE: pt_BR
      APP_FALLBACK_LOCALE: en
      APP_AVAILABLE_LOCALES: pt_BR,en,es
      DB_CONNECTION: pgsql
      DB_HOST: postgres
      DB_PORT: 5432
      DB_DATABASE: erp_universal
      DB_USERNAME: erp
      DB_PASSWORD: ${DB_PASSWORD:-erp_secret_2026}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      CACHE_STORE: redis
      QUEUE_CONNECTION: redis
      SESSION_DRIVER: redis
    ports:
      - '80:80'
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - app_storage:/var/www/html/storage

volumes:
  postgres_data:
  redis_data:
  app_storage:
