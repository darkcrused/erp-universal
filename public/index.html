<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>ERP Universal</title>
  <style>
    body{font-family:system-ui,-apple-system,Segoe UI,Roboto,Arial,sans-serif;margin:0;min-height:100vh;display:grid;place-items:center;background:#0f172a;color:#e2e8f0}
    .card{max-width:720px;padding:32px;border:1px solid #334155;border-radius:20px;background:#111827;box-shadow:0 20px 60px rgba(0,0,0,.35)}
    h1{margin:0 0 12px;font-size:2rem}
    p{line-height:1.6;margin:8px 0}
    a{color:#38bdf8;text-decoration:none}
    code{background:#0b1120;padding:2px 6px;border-radius:6px}
  </style>
</head>
<body>
  <main class="card">
    <h1>ERP Universal</h1>
    <p>Sistema de gestão empresarial multi-tenant online.</p>
    <p>Teste da API: <a href="/api/ping">/api/ping</a></p>
    <p>Login: <code>/api/auth/login</code></p>
  </main>
</body>
</html>
